<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Platoon 4</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }

    /* Rotate portrait phone into landscape */
    .landscape-wrapper {
      position: fixed;
      width: 100vh;
      height: 100vw;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(90deg);
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      overflow: hidden;
    }

    /* LED dot grid */
    .landscape-wrapper::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(0,0,0,0.5) 1px, transparent 1px);
      background-size: 5px 5px;
      pointer-events: none;
      z-index: 10;
    }

    /* Full-screen scrolling strip with small margin */
    .led-board {
      position: absolute;
      inset: 12px; /* small margin on all sides */
      background: #050505;
      border: 3px solid #1a1a1a;
      border-radius: 8px;
      box-shadow:
        0 0 0 2px #2a2a2a,
        0 0 50px rgba(255, 0, 0, 0.25),
        inset 0 0 60px rgba(0,0,0,0.9);
      overflow: hidden;
      display: flex;
      align-items: center;
    }

    /* Scanlines */
    .led-board::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,0.1) 3px,
        rgba(0,0,0,0.1) 4px
      );
      pointer-events: none;
      z-index: 5;
    }

    .marquee-track {
      display: flex;
      width: max-content;
      animation: scroll-left 6s linear infinite;
    }

    .marquee-text {
      font-family: 'Impact', 'Arial Black', sans-serif;
      font-weight: 900;
      /* 100vw = landscape height after rotation, fill ~85% of it */
      font-size: 82vw;
      color: #FF0000;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
      padding-right: 30vw;
      line-height: 1;
      text-shadow:
        0 0 8px #ff0000,
        0 0 20px #ff0000,
        0 0 40px #cc0000,
        0 0 80px #990000;
    }

    @keyframes scroll-left {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    /* Corner screws */
    .screw {
      position: absolute;
      width: 10px; height: 10px;
      background: radial-gradient(circle at 35% 35%, #555, #111);
      border-radius: 50%;
      border: 1px solid #444;
      z-index: 20;
    }
    .screw.tl { top: 8px;    left: 10px;  }
    .screw.tr { top: 8px;    right: 10px; }
    .screw.bl { bottom: 8px; left: 10px;  }
    .screw.br { bottom: 8px; right: 10px; }

    /* Blinking live dot — bottom right */
    .live {
      position: absolute;
      bottom: 10px;
      right: 18px;
      display: flex;
      align-items: center;
      gap: 6px;
      z-index: 20;
    }
    .live-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #ff0000;
      box-shadow: 0 0 8px #ff0000;
      animation: blink 1s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.1; }
    }
    .live-label {
      color: #550000;
      font-family: 'Courier New', monospace;
      font-size: 0.55rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="landscape-wrapper">
    <div class="led-board">
      <div class="screw tl"></div>
      <div class="screw tr"></div>
      <div class="screw bl"></div>
      <div class="screw br"></div>

      <div class="marquee-track">
        <span class="marquee-text">PLATOON 4 ★ PLATOON 4 ★ PLATOON 4 ★ </span>
        <span class="marquee-text">PLATOON 4 ★ PLATOON 4 ★ PLATOON 4 ★ </span>
      </div>

      <div class="live">
        <div class="live-dot"></div>
        <span class="live-label">LIVE</span>
      </div>
    </div>
  </div>
</body>
</html>
