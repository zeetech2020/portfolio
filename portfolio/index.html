<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Platoon 4</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* The trick: rotate the entire page 90deg inside the viewport */
    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }

    /* Rotated landscape wrapper — makes portrait phone show landscape */
    .landscape-wrapper {
      position: fixed;
      /* Swap width/height so it fills the rotated space */
      width: 100vh;
      height: 100vw;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(90deg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #000;
      overflow: hidden;
    }

    /* LED dot grid overlay */
    .landscape-wrapper::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(0,0,0,0.55) 1px, transparent 1px);
      background-size: 6px 6px;
      pointer-events: none;
      z-index: 10;
    }

    /* LED board fills almost full width of the (rotated) landscape space */
    .led-board {
      width: 96%;
      background: #0a0a0a;
      border: 4px solid #1a1a1a;
      border-radius: 10px;
      box-shadow:
        0 0 0 2px #333,
        0 0 40px rgba(255, 0, 0, 0.2),
        inset 0 0 40px rgba(0,0,0,0.9);
      padding: 16px 0;
      overflow: hidden;
      position: relative;
    }

    /* Scanlines */
    .led-board::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,0.1) 3px,
        rgba(0,0,0,0.1) 4px
      );
      pointer-events: none;
      z-index: 5;
    }

    .marquee-track {
      display: flex;
      width: max-content;
      animation: scroll-left 7s linear infinite;
    }

    .marquee-text {
      font-family: 'Impact', 'Arial Black', sans-serif;
      font-weight: 900;
      /* 100vh is now the landscape WIDTH — so use vh for font scaling */
      font-size: clamp(3rem, 18vh, 10rem);
      color: #FF0000;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      white-space: nowrap;
      padding-right: 10vh;
      text-shadow:
        0 0 6px #ff0000,
        0 0 16px #ff0000,
        0 0 32px #cc0000,
        0 0 60px #990000;
    }

    @keyframes scroll-left {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    /* Corner screws */
    .screw {
      position: absolute;
      width: 10px; height: 10px;
      background: radial-gradient(circle at 35% 35%, #555, #111);
      border-radius: 50%;
      border: 1px solid #444;
    }
    .screw.tl { top: 7px;    left: 10px;  }
    .screw.tr { top: 7px;    right: 10px; }
    .screw.bl { bottom: 7px; left: 10px;  }
    .screw.br { bottom: 7px; right: 10px; }

    /* Status bar */
    .status-bar {
      margin-top: 12px;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #ff0000;
      box-shadow: 0 0 6px #ff0000;
      animation: blink 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.4s; }
    .dot:nth-child(3) { animation-delay: 0.8s; }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.15; }
    }
    .status-label {
      color: #550000;
      font-family: 'Courier New', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div class="landscape-wrapper">

    <div class="led-board">
      <div class="screw tl"></div>
      <div class="screw tr"></div>
      <div class="screw bl"></div>
      <div class="screw br"></div>

      <div class="marquee-track">
        <span class="marquee-text">⚡ PLATOON 4 &nbsp;★&nbsp; PLATOON 4 &nbsp;★&nbsp; PLATOON 4 &nbsp;★&nbsp;</span>
        <span class="marquee-text">⚡ PLATOON 4 &nbsp;★&nbsp; PLATOON 4 &nbsp;★&nbsp; PLATOON 4 &nbsp;★&nbsp;</span>
      </div>
    </div>

    <div class="status-bar">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <span class="status-label">PLATOON 4 — LIVE</span>
    </div>

  </div>

</body>
</html>
