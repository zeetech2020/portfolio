<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Platoon 4</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #000;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* LED dot grid overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle, rgba(0,0,0,0.6) 1px, transparent 1px);
      background-size: 6px 6px;
      pointer-events: none;
      z-index: 10;
    }

    /* Outer LED board */
    .led-board {
      width: 96vw;
      background: #0a0a0a;
      border: 4px solid #1a1a1a;
      border-radius: 10px;
      box-shadow:
        0 0 0 2px #333,
        0 0 30px rgba(255, 0, 0, 0.15),
        inset 0 0 40px rgba(0,0,0,0.8);
      padding: 18px 0;
      overflow: hidden;
      position: relative;
    }

    /* Scanline effect */
    .led-board::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0, 0, 0, 0.08) 3px,
        rgba(0, 0, 0, 0.08) 4px
      );
      pointer-events: none;
      z-index: 5;
    }

    .marquee-track {
      display: flex;
      width: max-content;
      animation: scroll-left 8s linear infinite;
    }

    .marquee-text {
      font-family: 'Impact', 'Arial Black', sans-serif;
      font-weight: 900;
      font-size: clamp(4rem, 12vw, 9rem);
      color: #FF0000;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      white-space: nowrap;
      padding-right: 12vw;
      /* LED glow effect */
      text-shadow:
        0 0 6px #ff0000,
        0 0 14px #ff0000,
        0 0 28px #cc0000,
        0 0 50px #990000;
      /* Segment / blocky LED feel */
      -webkit-font-smoothing: none;
    }

    @keyframes scroll-left {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    /* Corner screws on board */
    .screw {
      position: absolute;
      width: 10px;
      height: 10px;
      background: radial-gradient(circle at 35% 35%, #555, #111);
      border-radius: 50%;
      border: 1px solid #444;
    }
    .screw.tl { top: 7px; left: 10px; }
    .screw.tr { top: 7px; right: 10px; }
    .screw.bl { bottom: 7px; left: 10px; }
    .screw.br { bottom: 7px; right: 10px; }

    /* Bottom status bar */
    .status-bar {
      margin-top: 14px;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #ff0000;
      box-shadow: 0 0 6px #ff0000;
      animation: blink 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.4s; }
    .dot:nth-child(3) { animation-delay: 0.8s; }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.15; }
    }
    .status-label {
      color: #550000;
      font-family: 'Courier New', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div class="led-board">
    <div class="screw tl"></div>
    <div class="screw tr"></div>
    <div class="screw bl"></div>
    <div class="screw br"></div>

    <div class="marquee-track">
      <!-- Duplicated for seamless loop -->
      <span class="marquee-text">⚡ PLATOON 4 &nbsp;★&nbsp; PLATOON 4 &nbsp;★&nbsp; PLATOON 4 &nbsp;★&nbsp;</span>
      <span class="marquee-text">⚡ PLATOON 4 &nbsp;★&nbsp; PLATOON 4 &nbsp;★&nbsp; PLATOON 4 &nbsp;★&nbsp;</span>
    </div>
  </div>

  <div class="status-bar">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <span class="status-label">PLATOON 4 — LIVE</span>
  </div>

</body>
</html>
